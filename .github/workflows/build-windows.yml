name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS model files
        shell: bash
        run: |
          git lfs pull
          echo "Model files:"
          ls -lh analyzer/models/*.pt analyzer/models/*.keras analyzer/models/*.onnx 2>/dev/null || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-win.txt"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m venv .venv
          call .venv\Scripts\activate.bat
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt
          pip install pyinstaller

      - name: Read version from VERSION.txt
        id: version
        shell: bash
        run: |
          if [ -f VERSION.txt ]; then
            VER=$(cat VERSION.txt | tr -d '[:space:]')
          else
            VER="alpha-$(date +%Y.%m.%d.%H.%M)"
          fi
          echo "app_version=$VER" >> "$GITHUB_OUTPUT"
          echo "release_name=LingjianLite" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Verify Inno Setup installation
        shell: bash
        run: |
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          if [ -f "$ISCC" ]; then
            echo "ISCC found at: $ISCC"
            "$ISCC" /? 2>&1 | head -5 || true
          else
            echo "ISCC not found at default path, searching..."
            find "/c/Program Files" "/c/Program Files (x86)" -name "ISCC.exe" 2>/dev/null
            echo "Installing via Chocolatey..."
            choco install innosetup -y --no-progress
          fi

      - name: Build with PyInstaller
        shell: cmd
        env:
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          call .venv\Scripts\activate.bat
          call packaging\build_installer_headless.bat
          if %ERRORLEVEL% NEQ 0 exit /b 1

      - name: Create ZIP archive
        shell: bash
        run: |
          mkdir -p artifact
          cd analyzer/dist
          7z a "../../artifact/LingjianLite-Windows.zip" "LingjianLite/" -r
          cd ../..
          echo "ZIP artifact created:"
          ls -lh artifact/

      - name: Verify Inno Setup inputs
        shell: bash
        run: |
          echo "=== Checking ISS source files ==="
          echo "PyInstaller output:"
          ls -d analyzer/dist/LingjianLite/ && echo "  OK" || echo "  MISSING!"
          echo "README.md:"
          ls LICENSE && echo "  OK" || echo "  MISSING!"
          echo "Logo files:"
          ls assets/logo.png assets/logo.ico && echo "  OK" || echo "  MISSING!"
          echo "ISS languages dir:"
          ls "/c/Program Files (x86)/Inno Setup 6/Languages/ChineseSimplified.isl" 2>/dev/null && echo "  OK" || echo "  ChineseSimplified.isl NOT FOUND!"
          echo "Output dir:"
          mkdir -p dist/installer
          echo "  OK"

      - name: Build Inno Setup installer
        shell: cmd
        env:
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          if not exist "dist\installer" mkdir "dist\installer"
          echo === Running ISCC with verbose output ===
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /V9 ^
            /DReleaseName="%RELEASE_NAME%" ^
            /DAppVersion="%APP_VERSION%" ^
            "packaging\kestrel_installer.iss"
          if %ERRORLEVEL% NEQ 0 (
            echo.
            echo [ERROR] Inno Setup build failed with exit code %ERRORLEVEL%
            exit /b 1
          )

      - name: Collect installer artifact
        if: always()
        shell: bash
        run: |
          echo "=== Searching for Setup.exe ==="
          find . -name "*Setup*.exe" -o -name "*.exe" 2>/dev/null | grep -iv python | grep -iv venv | head -20
          echo "=== dist/installer/ contents ==="
          ls -lhR dist/installer/ 2>/dev/null || echo "dist/installer/ not found"
          echo "=== Copying to artifact/ ==="
          cp dist/installer/*.exe artifact/ 2>/dev/null || true
          echo "=== Final artifact/ contents ==="
          ls -lh artifact/

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: windows-installer
          path: artifact/*-Setup.exe

      - name: Upload ZIP artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: artifact/LingjianLite-Windows.zip

      - name: Create GitHub Release
        if: always() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/*-Setup.exe
            artifact/LingjianLite-Windows.zip
          generate_release_notes: true
