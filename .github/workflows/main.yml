name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Download model file (mask_rcnn_resnet50_fpn_v2.pth)
        shell: powershell
        run: |
          Write-Host "Downloading mask_rcnn_resnet50_fpn_v2.pth from GitHub release..."
          New-Item -ItemType Directory -Force -Path "analyzer\models" | Out-Null
          Invoke-WebRequest -Uri "https://github.com/SanjaySoniLV/ProjectKestrel/releases/download/test/mask_rcnn_resnet50_fpn_v2.pth" `
            -OutFile "analyzer\models\mask_rcnn_resnet50_fpn_v2.pth"
          
          Write-Host ""
          Write-Host "Verifying download..."
          if (-not (Test-Path "analyzer\models\mask_rcnn_resnet50_fpn_v2.pth")) {
            Write-Host "ERROR: mask_rcnn_resnet50_fpn_v2.pth not found after download"
            exit 1
          }
          
          $fileSize = (Get-Item "analyzer\models\mask_rcnn_resnet50_fpn_v2.pth").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          
          if ($fileSize -lt 100000) {
            Write-Host "ERROR: Downloaded file is too small ($fileSize bytes), likely download failed"
            exit 1
          }
          
          Write-Host ""
          Write-Host "Contents of analyzer\models\:"
          Get-ChildItem "analyzer\models\" | Format-Table Name, Length, LastWriteTime
          Write-Host ""
          Write-Host "Model file successfully downloaded and verified"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv
        shell: powershell
        run: |
          python -m venv .venv2
          .\.venv2\Scripts\Activate.ps1
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        shell: powershell
        run: |
          .\.venv2\Scripts\Activate.ps1
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://jrsoftware.org/download.php/is.exe -OutFile is.exe
          Start-Process -FilePath .\is.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) { throw "Inno Setup not found" }

      - name: Run installer build
        shell: powershell
        run: |
          .\packaging\build_installer_headless.bat

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/**/*-Setup.exe

      - name: Upload analyzer executable
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-exe
          path: release/**/kestrel_analyzer.exe

      - name: Upload visualizer executable
        uses: actions/upload-artifact@v4
        with:
          name: visualizer-exe
          path: release/**/visualizer.exe
