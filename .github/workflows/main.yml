name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model files
        shell: powershell
        run: |
          Write-Host "Downloading model files from GitHub release..."
          New-Item -ItemType Directory -Force -Path "analyzer\models" | Out-Null

          $models = @(
            @{ name = "mask_rcnn_resnet50_fpn_v2.pth"; url = "https://github.com/SanjaySoniLV/ProjectKestrel/releases/download/test/mask_rcnn_resnet50_fpn_v2.pth" }
          )

          foreach ($m in $models) {
            Write-Host "  -> $($m.name)"
            Invoke-WebRequest -Uri $m.url -OutFile "analyzer\models\$($m.name)"
            $size = (Get-Item "analyzer\models\$($m.name)").Length
            if ($size -lt 100000) { throw "Downloaded $($m.name) is too small ($size bytes)" }
            Write-Host "     OK ($size bytes)"
          }

          Write-Host ""
          Write-Host "Contents of analyzer\models\:"
          Get-ChildItem "analyzer\models\" | Format-Table Name, Length, LastWriteTime

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        shell: powershell
        run: |
          python -m venv .venv2
          .\.venv2\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup 6
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://jrsoftware.org/download.php/is.exe -OutFile is.exe
          Start-Process -FilePath .\is.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            throw "Inno Setup not found after install"
          }
          Write-Host "Inno Setup 6 installed."

      - name: Build ProjectKestrel (onedir + installer)
        shell: cmd
        run: packaging\build_installer_headless.bat

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

      - name: Upload ProjectKestrel onedir bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: analyzer/dist/ProjectKestrel/
