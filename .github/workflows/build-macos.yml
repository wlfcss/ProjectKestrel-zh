name: Build macOS Artifacts

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install Qt (qmake)
        shell: bash
        run: |
          brew update
          brew install qt@5
          QT_PREFIX="$(brew --prefix qt@5)"
          export PATH="${QT_PREFIX}/bin:$PATH"
          echo "${QT_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "QT_PREFIX=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L${QT_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I${QT_PREFIX}/include" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${QT_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          command -v qmake
          qmake -v

      - name: Create venv and install deps
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-macos.txt

      - name: Run macOS headless build
        shell: bash
        run: |
          chmod +x packaging/build_installer_headless.sh
          ./packaging/build_installer_headless.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/**
