name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull LFS model files
        shell: bash
        run: |
          git lfs pull
          echo "Model files:"
          ls -lh analyzer/models/*.pt analyzer/models/*.keras analyzer/models/*.onnx 2>/dev/null || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        shell: bash
        run: |
          chmod +x packaging/build_app_headless.sh
          ./packaging/build_app_headless.sh

      - name: Create DMG
        shell: bash
        run: |
          brew install create-dmg

          APP_PATH="analyzer/dist/ç¿Žé‰´ Lite.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            exit 1
          fi

          mkdir -p artifact

          create-dmg \
            --volname "ç¿Žé‰´ Lite" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "ç¿Žé‰´ Lite.app" 140 190 \
            --app-drop-link 400 190 \
            --hide-extension "ç¿Žé‰´ Lite.app" \
            "artifact/LingjianLite.dmg" \
            "$APP_PATH"

          echo "DMG created:"
          ls -lh artifact/

      - name: Create zip archive
        shell: bash
        run: |
          cd analyzer/dist
          ditto -c -k --keepParent "ç¿Žé‰´ Lite.app" "../../artifact/LingjianLite-macOS.zip"
          cd ../..
          echo "ZIP created:"
          ls -lh artifact/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: artifact/LingjianLite.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: artifact/LingjianLite-macOS.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/LingjianLite.dmg
            artifact/LingjianLite-macOS.zip
          generate_release_notes: true
