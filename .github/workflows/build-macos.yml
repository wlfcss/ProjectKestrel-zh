name: Build macOS Artifacts

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model file (mask_rcnn_resnet50_fpn_v2.pth)
        shell: bash
        run: |
          echo "Downloading mask_rcnn_resnet50_fpn_v2.pth from GitHub release..."
          mkdir -p analyzer/models
          curl -L -o analyzer/models/mask_rcnn_resnet50_fpn_v2.pth \
            "https://github.com/SanjaySoniLV/ProjectKestrel/releases/download/test/mask_rcnn_resnet50_fpn_v2.pth"
          
          echo ""
          echo "Verifying download..."
          if [ ! -f analyzer/models/mask_rcnn_resnet50_fpn_v2.pth ]; then
            echo "ERROR: mask_rcnn_resnet50_fpn_v2.pth not found after download"
            exit 1
          fi
          
          FILE_SIZE=$(stat -f%z analyzer/models/mask_rcnn_resnet50_fpn_v2.pth 2>/dev/null || stat -c%s analyzer/models/mask_rcnn_resnet50_fpn_v2.pth 2>/dev/null)
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          
          if [ "${FILE_SIZE}" -lt 100000 ]; then
            echo "ERROR: Downloaded file is too small (${FILE_SIZE} bytes), likely download failed"
            exit 1
          fi
          
          echo ""
          echo "Contents of analyzer/models/:"
          ls -lh analyzer/models/
          echo ""
          echo "Model file successfully downloaded and verified"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create venv and install deps
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-macos.txt

      - name: Python smoke test (pre-build)
        shell: bash
        run: |
          set -e
          source .venv2/bin/activate
          echo "Running Python smoke test to verify rawpy and image_utils work..."
          python analyzer/cli.py --smoke test_imgs --no-gpu
          echo "Python smoke test PASSED - rawpy is working correctly"

      - name: Run macOS headless build
        shell: bash
        run: |
          chmod +x packaging/build_installer_headless.sh
          ./packaging/build_installer_headless.sh

      - name: Smoke test bundled analyzer (CLI)
        shell: bash
        run: |
          TEST_DIR="$(pwd)/ci_smoke"
          mkdir -p "${TEST_DIR}"
          COPIED_COUNT=0
          for src in test_imgs/*.CR3 test_imgs/*.cr3; do
            if [[ -f "${src}" ]]; then
              echo "Copying test image: ${src}"
              cp "${src}" "${TEST_DIR}/"
              COPIED_COUNT=$((COPIED_COUNT + 1))
            fi
          done
          echo "Copied ${COPIED_COUNT} CR3 images to ${TEST_DIR}"

          APP_PATH=$(ls -d release/**/kestrel_analyzer.app | head -n 1)
          "${APP_PATH}/Contents/MacOS/kestrel_analyzer" --cli "${TEST_DIR}" --no-gpu --smoke

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/**/ProjectKestrel-*.pkg

      - name: Upload analyzer app
        uses: actions/upload-artifact@v4
        with:
          name: macos-analyzer-app
          path: release/**/kestrel_analyzer.app

      - name: Upload visualizer app
        uses: actions/upload-artifact@v4
        with:
          name: macos-visualizer-app
          path: release/**/visualizer.app
