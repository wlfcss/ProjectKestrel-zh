name: Build macOS Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model files
        shell: bash
        run: |
          echo "Downloading model files from GitHub release..."
          mkdir -p analyzer/models

          curl -L -o analyzer/models/mask_rcnn_resnet50_fpn_v2.pth \
            "https://github.com/SanjaySoniLV/ProjectKestrel/releases/download/test/mask_rcnn_resnet50_fpn_v2.pth"

          echo "Verifying download..."
          if [ ! -f analyzer/models/mask_rcnn_resnet50_fpn_v2.pth ]; then
            echo "ERROR: mask_rcnn_resnet50_fpn_v2.pth not found after download"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z analyzer/models/mask_rcnn_resnet50_fpn_v2.pth 2>/dev/null || stat -c%s analyzer/models/mask_rcnn_resnet50_fpn_v2.pth)
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          if [ "${FILE_SIZE}" -lt 100000 ]; then
            echo "ERROR: Downloaded file too small (${FILE_SIZE} bytes)"
            exit 1
          fi
          echo "Contents of analyzer/models/:"
          ls -lh analyzer/models/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create venv and install dependencies
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements-macos.txt
          pip install pyinstaller

      # ---- Smoke tests disabled until CLI/--smoke is integrated ----
      # - name: Python smoke test (pre-build)
      #   shell: bash
      #   run: |
      #     source .venv2/bin/activate
      #     python analyzer/cli.py --smoke test_imgs --no-gpu

      - name: Run macOS headless build
        shell: bash
        run: |
          chmod +x packaging/build_installer_headless.sh
          ./packaging/build_installer_headless.sh

      # ---- Smoke test bundled binary disabled until CLI/--smoke is integrated ----
      # - name: Smoke test bundled binary (CLI)
      #   shell: bash
      #   run: |
      #     TEST_DIR="$(pwd)/ci_smoke"
      #     mkdir -p "${TEST_DIR}"
      #     for src in test_imgs/*.CR3 test_imgs/*.cr3; do
      #       [[ -f "${src}" ]] && cp "${src}" "${TEST_DIR}/"
      #     done
      #     ./analyzer/dist/ProjectKestrel/ProjectKestrel --cli "${TEST_DIR}" --no-gpu --smoke

      - name: Upload macOS installer (.pkg)
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/**/ProjectKestrel-*.pkg

      - name: Upload macOS onedir bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: analyzer/dist/ProjectKestrel/
