name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model files
        shell: bash
        run: |
          echo "Downloading model files from GitHub release..."
          mkdir -p analyzer/models

          curl -L -o analyzer/models/mask_rcnn_resnet50_fpn_v2.pth \
            "https://github.com/SanjaySoniLV/ProjectKestrel/releases/download/test/mask_rcnn_resnet50_fpn_v2.pth"

          FILE_SIZE=$(stat -f%z analyzer/models/mask_rcnn_resnet50_fpn_v2.pth 2>/dev/null || stat -c%s analyzer/models/mask_rcnn_resnet50_fpn_v2.pth)
          echo "Downloaded: ${FILE_SIZE} bytes"
          if [ "${FILE_SIZE}" -lt 100000 ]; then
            echo "ERROR: Downloaded file too small (${FILE_SIZE} bytes)"
            exit 1
          fi
          ls -lh analyzer/models/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m venv .venv2
          source .venv2/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        shell: bash
        run: |
          chmod +x packaging/build_app_headless.sh
          ./packaging/build_app_headless.sh

      - name: Create DMG
        shell: bash
        run: |
          brew install create-dmg

          APP_PATH="analyzer/dist/Project Kestrel.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            exit 1
          fi

          mkdir -p artifact

          create-dmg \
            --volname "翎鉴 Project Kestrel" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Project Kestrel.app" 140 190 \
            --app-drop-link 400 190 \
            --hide-extension "Project Kestrel.app" \
            "artifact/ProjectKestrel.dmg" \
            "$APP_PATH"

          echo "DMG created:"
          ls -lh artifact/

      - name: Create zip archive
        shell: bash
        run: |
          cd analyzer/dist
          ditto -c -k --keepParent "Project Kestrel.app" "../../artifact/ProjectKestrel-macOS.zip"
          cd ../..
          echo "ZIP created:"
          ls -lh artifact/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: artifact/ProjectKestrel.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: artifact/ProjectKestrel-macOS.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/ProjectKestrel.dmg
            artifact/ProjectKestrel-macOS.zip
          generate_release_notes: true
