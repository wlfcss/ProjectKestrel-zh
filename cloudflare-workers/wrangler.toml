name = "kestrel-api-worker"
main = "worker.js"
compatibility_date = "2024-12-01"

# Route configuration — update to match your Cloudflare zone
# route = { pattern = "api.projectkestrel.org/*", zone_name = "projectkestrel.org" }

# KV Namespace bindings — create these first:
#   npx wrangler kv namespace create ANALYTICS
#   npx wrangler kv namespace create RATE_LIMIT
# Then paste the IDs below.
[[kv_namespaces]]
binding = "ANALYTICS"
id = "REPLACE_WITH_ANALYTICS_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_RATE_LIMIT_KV_ID"

# Secrets — set these via:
#   npx wrangler secret put KESTREL_SHARED_SECRET
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put NOTIFY_EMAIL
#   npx wrangler secret put ADMIN_KEY
# [vars]
# (none — all sensitive values go through secrets)
