<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Culling Assistant — Project Kestrel</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: #111318;
      --muted: #8a9099;
      --text: #e7e9ee;
      --brand: #4aa3ff;
      --ok: #2ecc71;
      --warn: #f39c12;
      --bad: #e74c3c;
      --card: #161922;
      --card-border: #222634;
      --accept: #1a3a1a;
      --accept-border: #2ecc71;
      --reject: #3a1a1a;
      --reject-border: #e74c3c;
      --unrated-bg: rgba(255, 200, 0, 0.08);
      --unrated-border: #f0c040;
      --card-width: 150px;
      --preview-w: calc(100vw / 3);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 13px/1.35 system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ---- Top bar (merged: left title | center hints | right stats) ---- */
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 5px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
      gap: 8px;
      min-height: 34px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .topbar-left h1 {
      font-size: 14px;
      margin: 0;
      font-weight: 700;
      color: var(--brand);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-left .folder-name {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar-center {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }
    .topbar-center kbd {
      background: #222634;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    /* ---- Main layout ---- */
    .main-layout {
      display: flex;
      flex: 1 1 0;
      min-height: 0;
    }

    /* ---- Culling pane (left 75%) ---- */
    .culling-pane {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .culling-header {
      display: flex;
      flex-shrink: 0;
      border-bottom: 1px solid var(--card-border);
    }
    .culling-header .col-header {
      flex: 1;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 13px;
      text-align: center;
    }
    .culling-header .col-header.accept { color: var(--ok); background: rgba(46,204,113,0.06); }
    .culling-header .col-header.reject { color: var(--bad); background: rgba(231,76,60,0.06); }

    .culling-scroll {
      flex: 1 1 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ---- Scene row ---- */
    .scene-row {
      border-bottom: 1px solid var(--card-border);
    }
    .scene-row.unrated {
      background: var(--unrated-bg);
      border-left: 3px solid var(--unrated-border);
    }
    .scene-label {
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scene-label b { color: var(--text); font-weight: 600; }
    .scene-label .unrated-badge {
      background: rgba(240,192,64,0.18);
      color: #f0c040;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .scene-columns {
      display: flex;
      min-height: 60px;
    }
    .scene-col {
      flex: 1;
      padding: 6px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
    }
    .scene-col.accept-col { background: rgba(46,204,113,0.03); }
    .scene-col.reject-col { background: rgba(231,76,60,0.03); }
    .scene-col-divider {
      width: 1px;
      background: var(--card-border);
      flex-shrink: 0;
    }

    /* ---- Image card (compact) ---- */
    .cull-card {
      width: var(--card-width, 150px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, opacity 0.2s;
      user-select: none;
      flex-shrink: 0;
    }
    .cull-card:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
    }
    .cull-card.accept-card { border-left: 3px solid var(--accept-border); }
    .cull-card.reject-card { border-left: 3px solid var(--reject-border); }
    .cull-card.unrated-card { border-left: 3px solid #f0c040; border: 1px solid #f0c040; }
    .cull-card.moved-card { opacity: 0.85; }
    .cull-card.moved-card::after {
      content: '\u21C4 moved';
      position: absolute;
      top: 2px;
      right: 3px;
      font-size: 9px;
      background: rgba(0,0,0,0.7);
      color: #aaa;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .cull-card .cull-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: #0a0b0d;
      position: relative;
    }
    .cull-card .cull-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cull-card .cull-info {
      padding: 4px 6px;
    }
    .cull-card .cull-filename {
      font-size: 11px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cull-card .cull-stars {
      font-size: 12px;
      line-height: 1;
      margin-top: 2px;
    }
    .cull-stars .star {
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      color: #2a3040;
      transition: color .12s ease;
    }
    .cull-stars .star.filled.auto { color: #6aa0ff; }
    .cull-stars .star.filled.manual { color: #f5c542; }
    .cull-stars .star:hover { color: #8fb6ff; }

    /* ---- Preview pane (right 25%) ---- */
    .preview-pane {
      flex: 0 0 var(--preview-w, 350px);
      min-width: 200px;
      display: flex;
      flex-direction: column;
      padding: 12px;
      overflow-y: auto;
      background: var(--panel);
    }
    .preview-pane h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .preview-img-box {
      width: 100%;
      aspect-ratio: 16/10;
      background: #0a0b0d;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-img-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .preview-img-box .muted {
      color: var(--muted);
      font-size: 12px;
    }
    .preview-meta {
      font-size: 12px;
      color: var(--text);
    }
    .preview-meta .row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid var(--card-border);
    }
    .preview-meta .label { color: var(--muted); }
    .preview-meta .value { font-weight: 600; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---- Bottom action bar ---- */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--panel);
      border-top: 1px solid var(--card-border);
      flex-shrink: 0;
    }
    .bottom-bar .status {
      color: var(--muted);
      font-size: 12px;
      flex: 1;
    }
    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: #1d2230; border-color: #3a84e6; }
    .btn.primary {
      background: #1a4a1a;
      border-color: var(--ok);
      color: var(--ok);
    }
    .btn.primary:hover { background: #1e5a1e; }
    .btn.danger {
      background: #3a1a1a;
      border-color: var(--bad);
      color: var(--bad);
    }
    .btn.danger:hover { background: #4a2020; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ---- Dialogs ---- */
    dialog {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      max-width: 520px;
      width: 90%;
    }
    dialog::backdrop { background: rgba(0,0,0,0.6); }
    dialog h2 { margin: 0 0 12px 0; font-size: 16px; }
    dialog p { margin: 6px 0; font-size: 13px; color: var(--text); line-height: 1.5; }
    dialog .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      justify-content: flex-end;
    }

    .hidden { display: none !important; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: #1d2230;
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ---- Resize divider ---- */
    .resize-divider {
      width: 6px;
      background: #1f2533;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .resize-divider:hover { background: #2a3040; }
    .resize-divider:active { background: var(--brand); }

    /* ---- Bottom bar zoom controls ---- */
    .btn.icon-btn {
      padding: 2px 9px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }
    .bottom-bar input[type="range"] {
      width: 72px;
      accent-color: var(--brand);
      cursor: pointer;
      flex-shrink: 0;
    }
    .bar-sep {
      width: 1px;
      height: 18px;
      background: var(--card-border);
      flex-shrink: 0;
    }

    /* ---- Preview header with zoom control ---- */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .preview-header h3 { margin-bottom: 0; }
    .zoom-level-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      cursor: default;
    }
    .zoom-level-wrap input[type="range"] {
      width: 60px;
      accent-color: var(--brand);
      cursor: pointer;
    }

    /* ---- Preview zoom mode ---- */
    .preview-img-box { position: relative; }
    .preview-img-box.zoom-active {
      overflow: hidden;
      cursor: crosshair;
      border: 1px solid var(--brand);
    }
    .preview-img-box.zoom-active img {
      max-width: none;
      max-height: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: none;
    }
    .preview-img-box.raw-loaded::after {
      content: 'RAW';
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--brand);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* ---- Tutorial overlay ---- */
    #tutorialOverlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      display: none;
    }
    #tutorialOverlay.active {
      display: block;
      /* pointer-events stays none so users can interact with UI underneath */
    }
    #tutorialOverlay.has-backdrop {
      background: rgba(0,0,0,0.6);
      pointer-events: all;
    }
    #tutorialHighlight {
      position: fixed;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.50);
      border: 2px solid var(--brand);
      transition: top .25s ease, left .25s ease, width .25s ease, height .25s ease;
      pointer-events: none;
      z-index: 10001;
      display: none;
    }
    #tutorialCard {
      position: fixed;
      background: #141820;
      border: 1px solid var(--brand);
      border-radius: 14px;
      padding: 20px 22px 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
      z-index: 10002;
      pointer-events: all;
      transition: top .25s ease, left .25s ease;
    }
    #tutorialCard h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--brand);
    }
    .tutorial-counter {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .tutorial-progress {
      display: flex;
      gap: 5px;
      margin-bottom: 12px;
      align-items: center;
    }
    .tutorial-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--card-border);
      transition: background .2s;
      flex-shrink: 0;
    }
    .tutorial-dot.active { background: var(--brand); }
    .tutorial-body {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 16px;
    }
    .tutorial-body kbd {
      background: #222634;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
    }
    .tutorial-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .tutorial-skip {
      margin-right: auto;
      color: var(--muted) !important;
      font-size: 12px;
      padding: 4px 10px;
    }
    /* Highlight-target pulsing animation for interactive steps */
    @keyframes pulse-highlight {
      0%   { box-shadow: 0 0 0 0 rgba(74,163,255,0.6); }
      70%  { box-shadow: 0 0 0 12px rgba(74,163,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,163,255,0); }
    }
    .highlight-target {
      z-index: 10001 !important;
      position: relative !important;
      animation: pulse-highlight 1.8s infinite;
      border-color: var(--brand) !important;
      pointer-events: auto !important;
    }
    /* Instruction nudge for click-to-advance steps */
    .tutorial-nudge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(74,163,255,0.12);
      border: 1px solid rgba(74,163,255,0.25);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      margin-bottom: 14px;
      animation: pulse-nudge 2s ease-in-out infinite;
    }
    @keyframes pulse-nudge {
      0%, 100% { opacity: 0.8; }
      50%      { opacity: 1; }
    }
    .tutorial-nudge::before { content: '\203A\00A0'; font-size: 14px; }
    .help-btn {
      padding: 5px 9px;
      height: auto;
      width: auto;
      border-radius: 5px;
      border: 1px solid var(--card-border);
      background: rgba(74, 163, 255, 0.08);
      color: var(--brand);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 0;
      flex-shrink: 0;
      transition: color .15s, border-color .15s, background .15s;
      line-height: 1;
    }
    .help-btn:hover { 
      background: rgba(74, 163, 255, 0.18);
      color: var(--brand); 
      border-color: var(--brand); 
    }
  </style>
</head>
<body>

  <!-- Top bar (merged) -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>Culling Assistant</h1>
      <span class="folder-name" id="folderName">Loading…</span>
    </div>
    <div class="topbar-center">
      <kbd>Shift+Click</kbd> accept/reject &nbsp;·&nbsp;
      Click <b>★</b> to rate &nbsp;·&nbsp;
      <kbd>Drag</kbd> thumbnail to zoom preview (loads RAW)
    </div>
    <div class="topbar-right" style="gap:8px">
      <span id="statsLabel"></span>
      <button class="help-btn" id="helpBtn" title="Show tutorial">❓ Help</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Culling pane -->
    <div class="culling-pane">
      <div class="culling-header">
        <div class="col-header accept">✓ Accept (4-5 ★)</div>
        <div class="col-header reject">✗ Reject (1-3 ★)</div>
      </div>
      <div class="culling-scroll" id="cullingScroll">
        <!-- Scene rows rendered here -->
      </div>
    </div>

    <!-- Resize divider -->
    <div class="resize-divider" id="resizeDivider" title="Drag to resize"></div>

    <!-- Preview pane -->
    <div class="preview-pane">
      <div class="preview-header">
        <h3>Preview</h3>
        <label class="zoom-level-wrap" title="RAW preview zoom (Shift+Drag on thumbnail)">
          <span>RAW Zoom</span>
          <input type="range" id="previewZoomSlider" min="2" max="10" value="5" step="1" />
          <span id="previewZoomLabel">5×</span>
        </label>
      </div>
      <div class="preview-img-box" id="previewExport">
        <span class="muted">Hover an image…</span>
      </div>
      <h3>Crop</h3>
      <div class="preview-img-box" id="previewCrop">
        <span class="muted">—</span>
      </div>
      <div class="preview-meta" id="previewMeta"></div>
    </div>
  </div>

  <!-- Bottom action bar -->
  <div class="bottom-bar">
    <button class="btn icon-btn" id="cardZoomOut" title="Smaller cards">−</button>
    <input type="range" id="cardZoomSlider" min="100" max="300" value="150" step="10" title="Card thumbnail size" />
    <button class="btn icon-btn" id="cardZoomIn" title="Larger cards">+</button>
    <div class="bar-sep"></div>
    <span class="status" id="statusLabel">Loading…</span>
    <button class="btn" id="undoBtn" disabled style="display:none">↩ Undo Move</button>
    <button class="btn primary" id="doneCullingBtn" disabled>Done Culling, Proceed to Review</button>
  </div>

  <!-- Confirmation dialog -->
  <dialog id="confirmDlg">
    <h2>Finish Culling</h2>
    <div id="confirmBody"></div>
    <div class="actions">
      <button class="btn" id="confirmCancel">Cancel</button>
      <button class="btn primary" id="confirmOk">Move Rejects &amp; Finish</button>
    </div>
  </dialog>

  <!-- Tutorial overlay -->
  <div id="tutorialOverlay">
    <div id="tutorialHighlight"></div>
    <div id="tutorialCard">
      <div class="tutorial-counter" id="tutorialCounter"></div>
      <div class="tutorial-progress" id="tutorialProgress"></div>
      <h3 id="tutorialTitle"></h3>
      <div class="tutorial-body" id="tutorialBody"></div>
      <div class="tutorial-nudge" id="tutorialNudge" style="display:none"></div>
      <div class="tutorial-actions">
        <button class="btn tutorial-skip" id="tutorialSkip">Skip Tour</button>
        <button class="btn" id="tutorialBack">&larr; Back</button>
        <button class="btn primary" id="tutorialNext">Next &rarr;</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ====================================================================
    // Culling Assistant — Project Kestrel
    // ====================================================================

    // ---- Helpers ----
    function el(sel) { return document.querySelector(sel); }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function parseNumber(v) { const n = parseFloat(v); return Number.isFinite(n) ? n : -1; }
    function fmt3(v) { const n = parseNumber(v); return n < 0 ? '—' : n.toFixed(3); }

    let toastTimer = null;
    function showToast(msg, ms = 3000) {
      const t = el('#toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), ms);
    }

    // ---- State ----
    let rootPath = '';
    let rows = [];
    let header = [];
    let scenes = [];            // [{id, images[], species, ...}]
    let cullingState = new Map(); // filename -> 'accept' | 'reject'
    let manuallyMoved = new Set(); // filenames the user has shift-clicked
    let blobUrlCache = new Map();
    let rejectFilenames = [];    // for undo after move
    let moveCompleted = false;
    let thumbDragPixels = 0;  // how many px the mouse moved during last thumb mousedown

    // ---- URL param ----
    function getUrlParam(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name) || '';
    }

    // ---- Wait for pywebview ----
    function waitForPywebview(timeout = 5000) {
      return new Promise((resolve) => {
        const checkApi = () => {
          // Check for both the api object AND a known method
          if (window.pywebview?.api && typeof window.pywebview.api.read_kestrel_csv === 'function') {
            resolve(true);
            return true;
          }
          return false;
        };
        
        if (checkApi()) return;
        
        const start = Date.now();
        const iv = setInterval(() => {
          if (checkApi()) { clearInterval(iv); resolve(true); }
          else if (Date.now() - start > timeout) { 
            clearInterval(iv); 
            console.error('Timeout waiting for pywebview API. window.pywebview:', window.pywebview, 'api:', window.pywebview?.api);
            resolve(false); 
          }
        }, 100);
      });
    }

    // ---- Image loading ----
    async function getBlobUrl(relPath, root) {
      if (!relPath) return '';
      const key = `${root}:${relPath}`;
      if (blobUrlCache.has(key)) return blobUrlCache.get(key);
      try {
        const res = await window.pywebview.api.read_image_file(relPath, root);
        if (res && res.success && res.data) {
          const url = `data:${res.mime || 'image/jpeg'};base64,${res.data}`;
          blobUrlCache.set(key, url);
          return url;
        }
      } catch (e) { console.warn('getBlobUrl error', e); }
      blobUrlCache.set(key, '');
      return '';
    }

    // Lazy-load images via IntersectionObserver
    const _lazyObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          const img = entry.target;
          const loader = img._lazyLoader;
          if (loader) { loader(); delete img._lazyLoader; }
          _lazyObserver.unobserve(img);
        }
      }
    }, { rootMargin: '300px' });

    function lazyLoadImg(img, resolverFn) {
      img._lazyLoader = async () => {
        const url = await resolverFn();
        if (url) img.src = url;
      };
      _lazyObserver.observe(img);
    }

    // ---- Rating helpers ----
    function getRating(row) {
      const n = parseInt(row?.rating, 10);
      return Number.isFinite(n) ? Math.max(0, Math.min(5, n)) : 0;
    }
    function getOrigin(row) {
      const s = String(row?.rating_origin || '').toLowerCase();
      return s === 'manual' ? 'manual' : (s === 'auto' ? 'auto' : '');
    }
    function setRating(row, val, origin = 'manual') {
      row.rating = String(Math.max(0, Math.min(5, parseInt(val, 10) || 0)));
      row.rating_origin = origin;
    }

    function isAccept(row) {
      return cullingState.get(row.filename) === 'accept';
    }

    // Interactive star bar (DOM-based, matching visualizer.html pattern)
    function createStarBar(row) {
      const wrap = document.createElement('div');
      wrap.className = 'cull-stars';

      function render(tempVal = null) {
        const val = tempVal != null ? tempVal : getRating(row);
        const origin = tempVal != null ? 'manual' : getOrigin(row);
        Array.from(wrap.children).forEach((st, i) => {
          const filled = i < val;
          st.classList.toggle('filled', filled);
          st.classList.toggle('manual', filled && origin === 'manual');
          st.classList.toggle('auto', filled && origin !== 'manual');
        });
      }

      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        s.textContent = '\u2605';
        s.title = `Set rating to ${i}`;
        s.addEventListener('mouseenter', () => render(i));
        s.addEventListener('mouseleave', () => render());
        s.addEventListener('click', (ev) => {
          ev.stopPropagation();
          setRating(row, i, 'manual');
          render();
          debouncedSave();
        });
        wrap.appendChild(s);
      }
      render();
      return wrap;
    }

    // ---- CSV helpers ----
    function csvEscape(v) {
      const s = String(v ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function rowsToCsvString(cols, rowList) {
      const lines = [cols.join(',')];
      for (const r of rowList) {
        lines.push(cols.map(k => csvEscape(k in r ? r[k] : '')).join(','));
      }
      return lines.join('\r\n');
    }

    // ---- Ensure columns ----
    function ensureColumns() {
      if (!header.includes('rating')) header.push('rating');
      if (!header.includes('rating_origin')) header.push('rating_origin');
      if (!header.includes('scene_name')) header.push('scene_name');
      for (const r of rows) {
        if (r.rating === undefined || r.rating === '') r.rating = '0';
        if (r.rating_origin === undefined) r.rating_origin = '';
      }
    }

    // ---- Aggregate scenes ----
    function aggregateScenes() {
      const groups = new Map();
      for (const r of rows) {
        const id = String(r.scene_count || '0');
        if (!groups.has(id)) groups.set(id, []);
        groups.get(id).push(r);
      }
      const list = [];
      for (const [sceneId, arr] of groups) {
        // representative by max quality
        let rep = arr[0];
        for (const r of arr) if (parseNumber(r.quality) > parseNumber(rep.quality)) rep = r;
        const speciesSet = new Set();
        for (const r of arr) {
          if (r.species && r.species !== 'No Bird' && r.species !== 'Unknown') speciesSet.add(r.species);
        }
        const maxQ = Math.max(...arr.map(a => parseNumber(a.quality)));
        const allUnrated = arr.every(r => getRating(r) === 0);
        const hasAnyUnrated = arr.some(r => getRating(r) === 0);
        const hasDetections = arr.some(r => r.species && r.species !== 'No Bird' && r.species !== 'Unknown' && r.species !== '');
        list.push({
          id: sceneId,
          images: arr.slice().sort((a, b) => parseNumber(b.quality) - parseNumber(a.quality)),
          representative: rep,
          species: Array.from(speciesSet).sort(),
          maxQuality: maxQ,
          sceneName: (arr.find(a => (a.scene_name || '').trim().length)?.scene_name || '').trim(),
          allUnrated,
          hasAnyUnrated,
          hasDetections,
        });
      }
      // Sort by scene_count ascending (chronological)
      list.sort((a, b) => parseInt(a.id, 10) - parseInt(b.id, 10));
      return list;
    }

    // ---- Initialize culling state from ratings ----
    function initCullingState() {
      cullingState.clear();
      manuallyMoved.clear();
      for (const r of rows) {
        const rating = getRating(r);
        if (rating >= 4) {
          cullingState.set(r.filename, 'accept');
        } else if (rating >= 1 && rating <= 3) {
          cullingState.set(r.filename, 'reject');
        } else {
          // Unrated (0): default to accept
          cullingState.set(r.filename, 'accept');
        }
      }
    }

    // ---- Swap image between accept/reject ----
    function swapImage(row) {
      const current = cullingState.get(row.filename);
      if (current === 'accept') {
        cullingState.set(row.filename, 'reject');
        setRating(row, 3, 'manual');
      } else {
        cullingState.set(row.filename, 'accept');
        setRating(row, 4, 'manual');
      }
      manuallyMoved.add(row.filename);
    }

    // ---- Build an image card ----
    function buildImageCard(row) {
      const rating = getRating(row);
      const isUnrated = rating === 0;
      const side = cullingState.get(row.filename) || 'accept';
      const card = document.createElement('div');
      card.className = isUnrated ? 'cull-card unrated-card' : `cull-card ${side}-card`;
      if (manuallyMoved.has(row.filename)) card.classList.add('moved-card');
      card.style.position = 'relative'; // for ::after badge

      const thumb = document.createElement('div');
      thumb.className = 'cull-thumb';
      const img = document.createElement('img');
      img.alt = row.filename || '';
      lazyLoadImg(img, () => getBlobUrl(row.export_path || row.crop_path, rootPath));
      thumb.appendChild(img);
      // Drag on thumbnail to zoom preview; Shift+drag also loads RAW
      thumb.addEventListener('mousedown', (ev) => {
        if (ev.button !== 0) return;
        ev.preventDefault();
        startZoomPreview(row, thumb, ev, true /* always loadRaw */);
      });
      card.appendChild(thumb);

      const info = document.createElement('div');
      info.className = 'cull-info';
      const fnDiv = document.createElement('div');
      fnDiv.className = 'cull-filename';
      fnDiv.title = row.filename || '';
      fnDiv.textContent = row.filename || '';
      info.appendChild(fnDiv);
      info.appendChild(createStarBar(row));
      card.appendChild(info);

      // Shift+click (no drag) to swap; Shift+drag is handled by mousedown
      card.addEventListener('click', (ev) => {
        if (ev.shiftKey && thumbDragPixels < 5) {
          ev.preventDefault();
          swapImage(row);
          renderScene(row.scene_count);
          updateStats();
          debouncedSave();
        }
      });

      // Hover: update preview
      card.addEventListener('mouseenter', () => updatePreview(row));

      return card;
    }

    // ---- Render a single scene row ----
    function renderScene(sceneId) {
      const scene = scenes.find(s => s.id === String(sceneId));
      if (!scene) return;
      const el = document.getElementById(`scene-row-${sceneId}`);
      if (!el) return;

      const accepts = scene.images.filter(r => cullingState.get(r.filename) === 'accept');
      const rejects = scene.images.filter(r => cullingState.get(r.filename) === 'reject');

      const acceptCol = el.querySelector('.accept-col');
      const rejectCol = el.querySelector('.reject-col');
      if (acceptCol) { acceptCol.innerHTML = ''; accepts.forEach(r => acceptCol.appendChild(buildImageCard(r))); }
      if (rejectCol) { rejectCol.innerHTML = ''; rejects.forEach(r => rejectCol.appendChild(buildImageCard(r))); }
    }

    // ---- Render all scenes ----
    function renderAllScenes() {
      const container = el('#cullingScroll');
      container.innerHTML = '';

      for (const scene of scenes) {
        const row = document.createElement('div');
        row.className = 'scene-row';
        row.id = `scene-row-${scene.id}`;
        if (scene.allUnrated) row.classList.add('unrated');

        // Scene label
        const label = document.createElement('div');
        label.className = 'scene-label';
        const speciesText = scene.species.length ? scene.species.join(', ') : 'Unknown';
        label.innerHTML = `<b>Scene #${escapeHtml(scene.id)}</b>` +
          (scene.sceneName ? ` — ${escapeHtml(scene.sceneName)}` : '') +
          ` <span style="color:var(--muted);font-size:11px">${escapeHtml(speciesText)} · ${scene.images.length} image${scene.images.length === 1 ? '' : 's'}</span>` +
          (scene.hasAnyUnrated ? ' <span class="unrated-badge">⚠ Contains unrated photos</span>' : '');
        row.appendChild(label);

        // Columns
        const cols = document.createElement('div');
        cols.className = 'scene-columns';

        const acceptCol = document.createElement('div');
        acceptCol.className = 'scene-col accept-col';

        const divider = document.createElement('div');
        divider.className = 'scene-col-divider';

        const rejectCol = document.createElement('div');
        rejectCol.className = 'scene-col reject-col';

        const accepts = scene.images.filter(r => cullingState.get(r.filename) === 'accept');
        const rejects = scene.images.filter(r => cullingState.get(r.filename) === 'reject');

        accepts.forEach(r => acceptCol.appendChild(buildImageCard(r)));
        rejects.forEach(r => rejectCol.appendChild(buildImageCard(r)));

        cols.appendChild(acceptCol);
        cols.appendChild(divider);
        cols.appendChild(rejectCol);
        row.appendChild(cols);
        container.appendChild(row);
      }
    }

    // ---- Update preview pane ----
    async function updatePreview(row) {
      // Export image
      const exportBox = el('#previewExport');
      exportBox.innerHTML = '<span class="muted">Loading…</span>';
      const exportUrl = await getBlobUrl(row.export_path, rootPath);
      if (exportUrl) {
        exportBox.innerHTML = '';
        const img = document.createElement('img');
        img.src = exportUrl;
        exportBox.appendChild(img);
      } else {
        exportBox.innerHTML = '<span class="muted">No export image</span>';
      }

      // Crop image
      const cropBox = el('#previewCrop');
      cropBox.innerHTML = '<span class="muted">Loading…</span>';
      const cropUrl = await getBlobUrl(row.crop_path, rootPath);
      if (cropUrl) {
        cropBox.innerHTML = '';
        const img = document.createElement('img');
        img.src = cropUrl;
        cropBox.appendChild(img);
      } else {
        cropBox.innerHTML = '<span class="muted">No crop image</span>';
      }

      // Metadata
      const side = cullingState.get(row.filename) || '—';
      const meta = el('#previewMeta');
      meta.innerHTML = `
        <div class="row"><span class="label">Filename</span><span class="value" title="${escapeHtml(row.filename || '')}">${escapeHtml(row.filename || '')}</span></div>
        <div class="row"><span class="label">Species</span><span class="value">${escapeHtml(row.species || 'Unknown')} (${fmt3(row.species_confidence)})</span></div>
        <div class="row"><span class="label">Quality</span><span class="value">${fmt3(row.quality)}</span></div>
        <div class="row meta-rating-row"><span class="label">Rating</span></div>
        <div class="row"><span class="label">Status</span><span class="value" style="color:${side==='accept' ? 'var(--ok)' : 'var(--bad)'}">${side === 'accept' ? '✓ Accept' : '✗ Reject'}</span></div>
        <div class="row"><span class="label">Scene</span><span class="value">#${escapeHtml(String(row.scene_count || ''))}</span></div>
      `;
      // Insert interactive star bar into the rating row
      const ratingRow = meta.querySelector('.meta-rating-row');
      if (ratingRow) {
        const starWrap = createStarBar(row);
        starWrap.style.cssText = 'display:flex;gap:2px;justify-content:flex-end;flex:1';
        ratingRow.appendChild(starWrap);
      }
    }

    // ---- Stats ----
    function updateStats() {
      let acceptCount = 0, rejectCount = 0;
      for (const [, side] of cullingState) {
        if (side === 'accept') acceptCount++;
        else rejectCount++;
      }
      el('#statsLabel').textContent = `${acceptCount} accept · ${rejectCount} reject · ${rows.length} total`;
      el('#statusLabel').textContent = `${acceptCount} images accepted, ${rejectCount} to reject`;

      const doneBtn = el('#doneCullingBtn');
      if (doneBtn) doneBtn.disabled = moveCompleted;
    }

    // ---- Auto-save (debounced) ----
    let saveTimer = null;
    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveCullingState(), 1500);
    }

    async function saveCullingState() {
      try {
        // Filter out internal __ keys
        const exportCols = header.filter(c => !c.startsWith('__'));
        const content = rowsToCsvString(exportCols, rows);
        await window.pywebview.api.write_kestrel_csv(rootPath, content);
      } catch (e) {
        console.warn('Auto-save failed', e);
      }
    }

    // ---- Done Culling flow ----
    function onDoneCulling() {
      let acceptCount = 0, rejectCount = 0;
      const rejectNames = [];
      for (const r of rows) {
        if (cullingState.get(r.filename) === 'reject') { rejectCount++; rejectNames.push(r.filename); }
        else acceptCount++;
      }

      const body = el('#confirmBody');
      body.innerHTML = `
        <p><b>${acceptCount}</b> image${acceptCount===1?'':'s'} will be <span style="color:var(--ok)">kept</span> in the folder.</p>
        <p><b>${rejectCount}</b> image${rejectCount===1?'':'s'} will be <span style="color:var(--bad)">moved</span> to <code>_KESTREL_Rejects</code> folder.</p>
        <p style="color:var(--muted);font-size:12px">A backup of kestrel_database.csv will be saved as kestrel_database_old.csv before any changes.</p>
      `;

      el('#confirmDlg').showModal();
    }

    async function executeMove() {
      el('#confirmDlg').close();
      el('#statusLabel').textContent = 'Processing…';
      el('#doneCullingBtn').disabled = true;

      try {
        // 1. Save current ratings
        await saveCullingState();

        // 2. Backup CSV
        const backupRes = await window.pywebview.api.backup_kestrel_csv(rootPath);
        if (!backupRes.success) {
          showToast('Failed to backup CSV: ' + (backupRes.error || ''), 5000);
          el('#doneCullingBtn').disabled = false;
          return;
        }

        // 3. Collect reject filenames
        rejectFilenames = [];
        for (const r of rows) {
          if (cullingState.get(r.filename) === 'reject') {
            rejectFilenames.push(r.filename);
          }
        }

        // 4. Move original files to _KESTREL_Rejects
        const moveRes = await window.pywebview.api.move_rejects_to_folder(rootPath, rejectFilenames);
        if (!moveRes.success) {
          showToast('Failed to move rejects: ' + (moveRes.error || ''), 5000);
          el('#doneCullingBtn').disabled = false;
          return;
        }

        // 5. Remove rejected rows from data and save cleaned CSV
        const rejectSet = new Set(rejectFilenames);
        rows = rows.filter(r => !rejectSet.has(r.filename));
        for (const fn of rejectSet) cullingState.delete(fn);
        await saveCullingState();

        // 6. Open reject folder
        try { await window.pywebview.api.open_reject_folder(rootPath); } catch(_) {}

        // 7. Notify main window
        try { await window.pywebview.api.notify_main_window_refresh(); } catch(_) {}

        // 8. Show undo button
        moveCompleted = true;
        const undoBtn = el('#undoBtn');
        undoBtn.style.display = '';
        undoBtn.disabled = false;

        // Re-aggregate and re-render with remaining images
        scenes = aggregateScenes();
        renderAllScenes();
        updateStats();

        showToast(`Moved ${moveRes.moved} image${moveRes.moved===1?'':'s'} to _KESTREL_Rejects`, 5000);
        if (moveRes.errors && moveRes.errors.length > 0) {
          console.warn('Move errors:', moveRes.errors);
          showToast(`${moveRes.errors.length} file(s) had errors — check console`, 5000);
        }

        el('#statusLabel').textContent = `Done! ${moveRes.moved} rejects moved. Click "Undo Move" to revert.`;
      } catch (e) {
        console.error('executeMove error', e);
        showToast('Error during move: ' + e.message, 5000);
        el('#doneCullingBtn').disabled = false;
      }
    }

    async function undoMove() {
      el('#statusLabel').textContent = 'Undoing move…';
      el('#undoBtn').disabled = true;
      try {
        // 1. Move files back
        const undoRes = await window.pywebview.api.undo_reject_move(rootPath, rejectFilenames);
        if (!undoRes.success) {
          showToast('Undo failed: ' + (undoRes.error || ''), 5000);
          el('#undoBtn').disabled = false;
          return;
        }

        // 2. Restore backup CSV
        const restoreRes = await window.pywebview.api.restore_kestrel_csv_backup(rootPath);
        if (!restoreRes.success) {
          showToast('CSV restore failed: ' + (restoreRes.error || ''), 5000);
        }

        // 3. Reload data from restored CSV
        await loadData();

        // 4. Notify main window
        try { await window.pywebview.api.notify_main_window_refresh(); } catch(_) {}

        moveCompleted = false;
        el('#undoBtn').style.display = 'none';
        el('#doneCullingBtn').disabled = false;

        showToast(`Restored ${undoRes.restored} file${undoRes.restored===1?'':'s'}.`, 4000);
        el('#statusLabel').textContent = 'Move undone. Continue culling or click Done Culling when ready.';
      } catch (e) {
        console.error('undoMove error', e);
        showToast('Undo error: ' + e.message, 5000);
        el('#undoBtn').disabled = false;
      }
    }

    // ---- Load data ----
    async function loadData() {
      console.log('[culling] loadData() starting...');
      console.log('[culling] window.pywebview:', window.pywebview);
      console.log('[culling] window.pywebview.api:', window.pywebview?.api);
      console.log('[culling] typeof read_kestrel_csv:', typeof window.pywebview?.api?.read_kestrel_csv);
      
      if (typeof window.pywebview?.api?.read_kestrel_csv !== 'function') {
        console.error('[culling] read_kestrel_csv is not available! Available properties:', Object.keys(window.pywebview?.api || {}));
        throw new Error('read_kestrel_csv is not available on the API');
      }
      
      const res = await window.pywebview.api.read_kestrel_csv(rootPath);
      if (!res.success) throw new Error(res.error || 'Failed to read CSV');

      const parsed = Papa.parse(res.data, { header: true, skipEmptyLines: true });
      header = parsed.meta.fields || [];
      rows = parsed.data || [];
      // Stamp rootPath (no __folderSlot needed — single folder)
      for (const r of rows) r.__rootPath = rootPath;
      ensureColumns();

      scenes = aggregateScenes();
      initCullingState();
      renderAllScenes();
      updateStats();
    }

    // ====================================================================
    // Persistent zoom settings
    // ====================================================================
    let _settingsSaveTimer = null;

    async function loadCullingSettings() {
      try {
        const res = await window.pywebview.api.get_settings();
        if (!res?.success) return;
        const s = res.settings || {};
        const cardZoom = parseInt(s.culling_card_zoom, 10);
        const rawZoom  = parseInt(s.culling_raw_zoom,  10);
        if (cardZoom >= 100 && cardZoom <= 300) {
          const sl = document.getElementById('cardZoomSlider');
          if (sl) { sl.value = cardZoom; document.documentElement.style.setProperty('--card-width', cardZoom + 'px'); }
        }
        if (rawZoom >= 2 && rawZoom <= 10) {
          const sl = document.getElementById('previewZoomSlider');
          const lb = document.getElementById('previewZoomLabel');
          if (sl) { sl.value = rawZoom; if (lb) lb.textContent = rawZoom + '×'; }
        }
      } catch (e) { console.warn('loadCullingSettings:', e); }
    }

    function saveCullingSettings() {
      clearTimeout(_settingsSaveTimer);
      _settingsSaveTimer = setTimeout(async () => {
        try {
          const res = await window.pywebview.api.get_settings();
          const s = (res?.success ? res.settings : {}) || {};
          s.culling_card_zoom = parseInt(document.getElementById('cardZoomSlider')?.value, 10) || 150;
          s.culling_raw_zoom  = parseInt(document.getElementById('previewZoomSlider')?.value, 10) || 5;
          await window.pywebview.api.save_settings_data(s);
        } catch (e) { console.warn('saveCullingSettings:', e); }
      }, 1200);
    }

    // ---- Card size zoom slider ----
    (function setupCardZoom() {
      const slider = document.getElementById('cardZoomSlider');
      const zoomIn = document.getElementById('cardZoomIn');
      const zoomOut = document.getElementById('cardZoomOut');
      if (!slider) return;
      const apply = () => document.documentElement.style.setProperty('--card-width', slider.value + 'px');
      slider.addEventListener('input', () => { apply(); saveCullingSettings(); });
      zoomIn?.addEventListener('click', () => {
        slider.value = Math.min(parseInt(slider.max), parseInt(slider.value) + parseInt(slider.step));
        apply(); saveCullingSettings();
      });
      zoomOut?.addEventListener('click', () => {
        slider.value = Math.max(parseInt(slider.min), parseInt(slider.value) - parseInt(slider.step));
        apply(); saveCullingSettings();
      });
    })();

    // ---- Resize divider between culling and preview pane ----
    (function setupResizeDivider() {
      const divider = document.getElementById('resizeDivider');
      const layout = document.querySelector('.main-layout');
      if (!divider || !layout) return;

      divider.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const layoutRect = layout.getBoundingClientRect();
        const onMove = (ev) => {
          const newW = Math.round(layoutRect.right - ev.clientX);
          const min = 200;
          const max = Math.max(300, Math.floor(layoutRect.width * 0.6));
          const clamped = Math.min(Math.max(newW, min), max);
          document.documentElement.style.setProperty('--preview-w', clamped + 'px');
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      divider.addEventListener('dblclick', () => {
        document.documentElement.style.setProperty('--preview-w', 'calc(100vw / 3)');
      });
    })();

    // ---- Preview zoom on click-drag ----
    let zoomActive = false;
    let zoomRow = null;
    let rawCache = new Map();   // filename -> base64 data URL
    let rawLoading = new Set(); // filenames currently loading

    function startZoomPreview(row, thumbEl, mouseEv, loadRaw) {
      zoomActive = true;
      zoomRow = row;
      thumbDragPixels = 0;

      const exportBox = el('#previewExport');
      const zoomSlider = el('#previewZoomSlider');
      const getScale = () => zoomSlider ? parseInt(zoomSlider.value, 10) : 5;

      exportBox.classList.add('zoom-active');

      // Ensure the best available image is shown and zoomed
      async function applyBestImage(clientX, clientY) {
        let img = exportBox.querySelector('img');
        const scale = getScale();
        const cachedRaw = rawCache.get(row.filename);

        if (cachedRaw && img?.dataset?.isRaw !== '1') {
          // Upgrade to cached RAW immediately
          exportBox.innerHTML = '';
          img = document.createElement('img');
          img.src = cachedRaw;
          img.dataset.isRaw = '1';
          exportBox.appendChild(img);
          exportBox.classList.add('raw-loaded');
        } else if (!img) {
          // No preview loaded — load export jpg
          const url = await getBlobUrl(row.export_path, rootPath);
          if (!zoomActive || zoomRow !== row) return;
          if (url) {
            exportBox.innerHTML = '';
            img = document.createElement('img');
            img.src = url;
            exportBox.appendChild(img);
          }
        }

        if (img && zoomActive && zoomRow === row) {
          applyZoomTransform(img, thumbEl, clientX, clientY, scale);
        }
      }

      applyBestImage(mouseEv.clientX, mouseEv.clientY);

      // Trigger RAW loading only on Shift+drag
      if (loadRaw && !rawCache.has(row.filename) && !rawLoading.has(row.filename)) {
        loadRawAsync(row);
      }

      const startX = mouseEv.clientX, startY = mouseEv.clientY;
      const onMove = (ev) => {
        if (!zoomActive) return;
        thumbDragPixels = Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY);
        const s = getScale();
        const curImg = el('#previewExport')?.querySelector('img');
        if (curImg) applyZoomTransform(curImg, thumbEl, ev.clientX, ev.clientY, s);
      };

      const onUp = () => {
        zoomActive = false;
        zoomRow = null;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        const box = el('#previewExport');
        box.classList.remove('zoom-active');
        box.classList.remove('raw-loaded');
        const curImg = box.querySelector('img');
        if (curImg) {
          curImg.style.transform = '';
          curImg.style.transformOrigin = '';
          delete curImg.dataset.isRaw;
        }
      };

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    function applyZoomTransform(img, thumbEl, clientX, clientY, scale) {
      const rect = thumbEl.getBoundingClientRect();
      const xPct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * 100;
      const yPct = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)) * 100;
      img.style.transform = `scale(${scale})`;
      img.style.transformOrigin = `${xPct}% ${yPct}%`;
    }

    async function loadRawAsync(row) {
      rawLoading.add(row.filename);
      try {
        const res = await window.pywebview.api.read_raw_full(row.filename, rootPath);
        if (res && res.success && res.data) {
          const url = `data:image/jpeg;base64,${res.data}`;
          rawCache.set(row.filename, url);
          // If still zooming on this row, swap to the high-res source
          if (zoomActive && zoomRow === row) {
            const img = el('#previewExport')?.querySelector('img');
            if (img) {
              img.src = url;
              img.dataset.isRaw = '1';
              img.title = 'RAW (full resolution)';
              el('#previewExport')?.classList.add('raw-loaded');
            }
          }
        }
      } catch (e) {
        console.warn('loadRawAsync error:', e);
      } finally {
        rawLoading.delete(row.filename);
      }
    }

    // Zoom slider live update while dragging
    (function setupPreviewZoom() {
      const slider = document.getElementById('previewZoomSlider');
      const label = document.getElementById('previewZoomLabel');
      if (!slider) return;
      slider.addEventListener('input', () => {
        if (label) label.textContent = slider.value + '\u00d7';
        if (zoomActive) {
          const img = el('#previewExport')?.querySelector('img');
          if (img) {
            const scale = parseInt(slider.value, 10);
            img.style.transform = `scale(${scale})`;
          }
        }
      });
    })();

    // ====================================================================
    // Tutorial  (Interactive — some steps require user action)
    // ====================================================================
    const TUTORIAL_STEPS = [
      {
        title: 'Welcome to Culling Assistant!',
        body: "Let\u2019s take a quick tour. You can <b>interact with the UI at any time</b> while this tour is open.<br><br>Click <b>Next</b> or press <kbd>\u2192</kbd> to advance, or <b>Skip Tour</b> to jump straight in.",
        target: null,
      },
      {
        title: 'Photos, Organized by Scene',
        body: 'Your photos are grouped into <b>scenes</b> \u2014 bursts taken close together in time. Kestrel\u2019s AI has sorted each scene by quality rating, so the best shots come first.',
        target: '#cullingScroll',
        position: 'right',
      },
      {
        title: 'Accept &amp; Reject Columns',
        body: 'Each scene has two columns. <span style="color:var(--ok)"><b>Accept</b></span> holds 4\u20135\u2605 photos; <span style="color:var(--bad)"><b>Reject</b></span> holds 1\u20133\u2605. Photos with <b>no rating (0\u2605)</b> show with a <span style="color:#f0c040"><b>yellow border</b></span> so you know they still need a decision.',
        target: '.culling-header',
        position: 'bottom',
      },
      {
        title: 'Hover to Preview',
        body: 'Hover over any photo card to load a <b>full preview</b> in the panel on the right. Kestrel automatically detected birds in your photos and prepared a zoomed crop preview.',
        target: '.scene-columns',
        position: 'right',
      },
      {
        title: 'The Preview Pane',
        body: 'The preview pane shows the full exported image and a Kestrel bird crop. Want to inspect a specific area? <b>Click and hold, then drag</b> on any thumbnail to zoom into that part of the image. If RAW files are available, Kestrel loads the full-resolution original automatically within a few seconds for maximum detail.',
        target: '.preview-pane',
        position: 'left',
      },
      {
        title: 'Move Photos with Shift+Click',
        body: '<kbd>Shift+Click</kbd> any photo card to flip it between Accept and Reject. A <span style="color:var(--ok)">green</span> left-border means Accept; <span style="color:var(--bad)">red</span> means Reject.<br><br>All changes are <b>auto-saved as you go</b>.',
        nudge: 'Try Shift+Clicking a photo now!',
        target: '.scene-columns',
        position: 'right',
        waitFor: 'shiftClick',
      },
      {
        title: 'Manual Star Ratings',
        body: '<b>Click the \u2605 stars</b> on any card to set a custom rating. <span style="color:#6aa0ff">Blue stars</span> are Kestrel\u2019s AI rating; <span style="color:#f5c542">gold stars</span> mean you\u2019ve overridden it manually.',
        target: '.cull-info',
        position: 'top',
      },
      {
        title: 'Resize &amp; Zoom Controls',
        body: 'Use the <b>\u2212 / + buttons</b> at the bottom-left to change card size. Drag the <b>divider</b> between the columns and preview panel to resize it. The <b>RAW Zoom</b> slider in the preview header adjusts zoom magnification when dragging thumbnails.',
        target: '.bottom-bar',
        position: 'top',
      },
      {
        title: 'Done Culling',
        body: 'When you\u2019re ready, click <b>\u201cDone Culling, Proceed to Review\u201d</b>. Kestrel will move all Rejected photos to a <code style="background:#1a1e28;padding:1px 5px;border-radius:3px">_KESTREL_Rejects</code> folder.<br><br><b>Kestrel never deletes your original photos</b> \u2014 they are always safe.',

        target: '#doneCullingBtn',
        position: 'top',
      },
    ];

    let _tutStep = 0;
    let _tutCleanupFn = null;

    async function checkTutorialSeen() {
      try {
        const res = await window.pywebview.api.get_settings();
        return res && res.settings && res.settings.culling_tutorial_seen === true;
      } catch (e) { return false; }
    }

    async function markTutorialSeen() {
      try {
        const res = await window.pywebview.api.get_settings();
        const s = (res && res.success ? res.settings : {}) || {};
        s.culling_tutorial_seen = true;
        await window.pywebview.api.save_settings_data(s);
      } catch (e) { console.warn('markTutorialSeen:', e); }
    }

    function _tutCleanup() {
      document.querySelectorAll('.highlight-target').forEach(function(e) { e.classList.remove('highlight-target'); });
      if (_tutCleanupFn) { _tutCleanupFn(); _tutCleanupFn = null; }
    }

    function startTutorial(fromStep) {
      _tutCleanup();
      _tutStep = fromStep || 0;
      el('#tutorialOverlay').classList.add('active');
      _showTutStep(_tutStep);
    }

    function _closeTutorial() {
      _tutCleanup();
      el('#tutorialOverlay').classList.remove('active', 'has-backdrop');
      el('#tutorialHighlight').style.display = 'none';
      el('#tutorialNudge').style.display = 'none';
      markTutorialSeen();
    }

    function _tutAdvance() {
      _tutStep++;
      if (_tutStep >= TUTORIAL_STEPS.length) _closeTutorial();
      else _showTutStep(_tutStep);
    }

    function _tutGoBack() {
      if (_tutStep > 0) { _tutStep--; _showTutStep(_tutStep); }
    }

    function _showTutStep(idx) {
      _tutCleanup();
      var step = TUTORIAL_STEPS[idx];
      if (!step) { _closeTutorial(); return; }

      var overlay  = el('#tutorialOverlay');
      var hl       = el('#tutorialHighlight');
      var card     = el('#tutorialCard');
      var nudge    = el('#tutorialNudge');
      var nextBtn  = el('#tutorialNext');

      // Update text
      el('#tutorialCounter').textContent = 'Step ' + (idx + 1) + ' of ' + TUTORIAL_STEPS.length;
      el('#tutorialTitle').innerHTML = step.title;
      el('#tutorialBody').innerHTML  = step.body;

      // Nudge (click-to-advance hint)
      if (step.nudge) {
        nudge.textContent = step.nudge;
        nudge.style.display = '';
      } else {
        nudge.style.display = 'none';
      }

      // Dots
      var dotsCont = el('#tutorialProgress');
      dotsCont.innerHTML = '';
      TUTORIAL_STEPS.forEach(function(_, i) {
        var d = document.createElement('div');
        d.className = 'tutorial-dot' + (i === idx ? ' active' : '');
        dotsCont.appendChild(d);
      });

      // Back / Next labels
      el('#tutorialBack').disabled = (idx === 0);
      var isLast = (idx === TUTORIAL_STEPS.length - 1);
      nextBtn.textContent = isLast ? 'Finish \u2713' : 'Next \u2192';

      // If this step uses waitFor, hide the Next button until the action completes
      var hasWaitFor = !!step.waitFor;
      nextBtn.style.display = hasWaitFor ? 'none' : '';

      var target = step.target ? document.querySelector(step.target) : null;

      if (!target) {
        // Center-screen card, full backdrop
        hl.style.display = 'none';
        overlay.classList.add('has-backdrop');
        card.style.transform = 'translate(-50%, -50%)';
        card.style.top  = '50%';
        card.style.left = '50%';
      } else {
        hl.style.display = '';
        overlay.classList.remove('has-backdrop');
        card.style.transform = '';

        // Pulsing highlight on target
        target.classList.add('highlight-target');

        var pad = 6;
        var r = target.getBoundingClientRect();
        hl.style.top    = (r.top  - pad) + 'px';
        hl.style.left   = (r.left - pad) + 'px';
        hl.style.width  = (r.width  + pad * 2) + 'px';
        hl.style.height = (r.height + pad * 2) + 'px';

        // Position card near target
        var pos    = step.position || 'right';
        var margin = 18;
        var vw     = window.innerWidth;
        var vh     = window.innerHeight;
        var cw     = 360 + margin;
        var ch     = card.offsetHeight || 200;
        var top, left;
        if (pos === 'right')       { left = r.right + margin;               top = r.top + r.height / 2 - ch / 2; }
        else if (pos === 'left')   { left = r.left - cw - margin;           top = r.top + r.height / 2 - ch / 2; }
        else if (pos === 'bottom') { left = r.left + r.width / 2 - cw / 2;  top = r.bottom + margin; }
        else                       { left = r.left + r.width / 2 - cw / 2;  top = r.top - ch - margin; }
        left = Math.max(margin, Math.min(left, vw - cw - margin));
        top  = Math.max(margin, Math.min(top,  vh - ch - margin));
        card.style.left = left + 'px';
        card.style.top  = top  + 'px';
      }

      // ---- Set up interactive waitFor listeners ----
      if (hasWaitFor && step.waitFor === 'hoverCard') {
        // Wait for user to hover over any cull-card.
        // Use a fired flag to prevent multiple rapid mouseenter events from multi-advancing.
        var _hoverFired = false;
        var hoverHandler = function(ev) {
          if (_hoverFired) return;
          var cardEl = ev.target.closest('.cull-card');
          if (cardEl) {
            _hoverFired = true;
            setTimeout(function() { _tutAdvance(); }, 500);
          }
        };
        document.addEventListener('mouseenter', hoverHandler, true);
        _tutCleanupFn = function() { document.removeEventListener('mouseenter', hoverHandler, true); };
      }
      else if (hasWaitFor && step.waitFor === 'shiftClick') {
        // Wait for user to Shift+Click a cull-card
        var shiftHandler = function(ev) {
          if (ev.shiftKey) {
            var cardEl = ev.target.closest('.cull-card');
            if (cardEl) {
              setTimeout(function() { _tutAdvance(); }, 300);
            }
          }
        };
        document.addEventListener('click', shiftHandler, true);
        _tutCleanupFn = function() { document.removeEventListener('click', shiftHandler, true); };
      }
      else if (hasWaitFor && step.waitFor === 'clickStar') {
        // Wait for user to click a star
        var starHandler = function(ev) {
          var starEl = ev.target.closest('.star, .stars span');
          if (starEl) {
            setTimeout(function() { _tutAdvance(); }, 300);
          }
        };
        document.addEventListener('click', starHandler, true);
        _tutCleanupFn = function() { document.removeEventListener('click', starHandler, true); };
      }
    }

    // ---- Init ----
    async function init() {
      rootPath = decodeURIComponent(getUrlParam('root'));
      if (!rootPath) {
        el('#statusLabel').textContent = 'Error: no folder specified';
        return;
      }

      const folderName = rootPath.replace(/.*[/\\]/, '') || rootPath;
      el('#folderName').textContent = folderName;

      const ready = await waitForPywebview();
      if (!ready) {
        el('#statusLabel').textContent = 'Error: pywebview API not available';
        return;
      }

      await loadCullingSettings();

      try {
        await loadData();
        el('#doneCullingBtn').disabled = false;
        el('#statusLabel').textContent = 'Ready \u2014 Drag images to zoom (auto-loads RAW), Shift+Click to decide, Click \u2605 to rate';

        // Auto-launch tutorial on first run
        const seen = await checkTutorialSeen();
        if (!seen) setTimeout(function() { startTutorial(0); }, 600);
      } catch (e) {
        console.error('init error', e);
        el('#statusLabel').textContent = 'Error loading data: ' + e.message;
      }

      // On window close/unload, clean up the culling_TMP cache
      window.addEventListener('beforeunload', async () => {
        try {
          await window.pywebview.api.cleanup_culling_cache(rootPath);
        } catch (e) {
          console.warn('cleanup_culling_cache error:', e);
        }
      });
    }

    // ---- Wire up buttons ----
    el('#doneCullingBtn').addEventListener('click', onDoneCulling);
    el('#confirmOk').addEventListener('click', executeMove);
    el('#confirmCancel').addEventListener('click', () => el('#confirmDlg').close());
    el('#undoBtn').addEventListener('click', undoMove);
    el('#helpBtn').addEventListener('click', () => startTutorial(0));
    el('#tutorialNext').addEventListener('click', function() { var step = TUTORIAL_STEPS[_tutStep]; if (step && step.waitFor) return; _tutAdvance(); });
    el('#tutorialBack').addEventListener('click', function() { _tutGoBack(); });
    el('#tutorialSkip').addEventListener('click', _closeTutorial);
    // Keyboard navigation inside tutorial
    document.addEventListener('keydown', function(ev) {
      if (!el('#tutorialOverlay').classList.contains('active')) return;
      var step = TUTORIAL_STEPS[_tutStep];
      var hasWaitFor = step && step.waitFor;
      if (ev.key === 'ArrowRight' || ev.key === 'Enter') {
        ev.preventDefault();
        if (!hasWaitFor) _tutAdvance();
      }
      else if (ev.key === 'ArrowLeft') { ev.preventDefault(); _tutGoBack(); }
      else if (ev.key === 'Escape') _closeTutorial();
    });

    // ---- Start ----
    init();
  </script>
</body>
